use_default_settings: true

general:
  debug: false
  instance_name: "WebSearch SearXNG"

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  formats:
    - json

server:
  # 由 docker-compose 通过 SEARXNG_SECRET_KEY 环境变量注入
  secret_key: "${SEARXNG_SECRET_KEY}"
  limiter: false      # 内网调用，关闭限速
  image_proxy: false
  method: GET

engines:
  - name: google
    engine: google
    shortcut: g
    weight: 2
  - name: bing
    engine: bing
    shortcut: b
    weight: 1.5
  - name: duckduckgo
    engine: duckduckgo
    shortcut: d
    weight: 1
