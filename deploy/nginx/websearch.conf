# Host Nginx config — place in /etc/nginx/sites-available/websearch
# then: sudo ln -s /etc/nginx/sites-available/websearch /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx

upstream websearch_api {
    server 127.0.0.1:5080;
    keepalive 32;
}

server {
    listen 80;
    server_name api.yourdomain.com;

    # Certbot will add HTTPS redirect; or uncomment after obtaining certs:
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://websearch_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Scrape can take a while
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}

