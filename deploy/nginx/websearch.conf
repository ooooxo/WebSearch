# WebSearch — Nginx 反向代理配置
# 放置路径: /etc/nginx/sites-available/websearch
# 启用:     sudo ln -s /etc/nginx/sites-available/websearch /etc/nginx/sites-enabled/
# 测试:     sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS 自动申请证书:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d api.yourdomain.com

# ── 限速区（定义在 http{} 外层，请确保放在 nginx.conf include 之前）──────
# 如果已在 /etc/nginx/nginx.conf 的 http{} 中定义过同名 zone，请注释此行
limit_req_zone $binary_remote_addr zone=websearch_api:10m rate=30r/m;

# ── upstream ──────────────────────────────────────────────────────────────
upstream websearch_backend {
    server 127.0.0.1:18900;   # 与 docker-compose APP_PORT 对应
    keepalive 32;
}

# ── HTTP → HTTPS 重定向 ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.yourdomain.com;

    # ACME challenge（certbot 用）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS 主配置 ──────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.yourdomain.com;

    # Certbot 自动填充证书路径（申请后自动写入）
    ssl_certificate     /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;

    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── 安全响应头 ────────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff                                always;
    add_header X-Frame-Options           DENY                                   always;

    # ── MCP SSE 端点（/mcp）─ 流式推送，禁缓冲，超时放宽 ──────────────────
    location /mcp {
        proxy_pass         http://websearch_backend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 必须：禁缓冲 + 保持连接
        proxy_set_header Connection        "";
        proxy_buffering                    off;
        proxy_cache                        off;
        chunked_transfer_encoding          on;

        # SSE 连接通常长连接，放宽超时
        proxy_connect_timeout   10s;
        proxy_send_timeout      3600s;
        proxy_read_timeout      3600s;
        keepalive_timeout       3600s;
    }

    # ── 健康探针（不限速）────────────────────────────────────────────────
    location /health {
        proxy_pass         http://websearch_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── REST API（/search, /scrape）─ 有限速 ──────────────────────────────
    location / {
        # 每 IP 30 次/分钟，超出排队（burst=10），再超出 429
        limit_req zone=websearch_api burst=10 nodelay;
        limit_req_status 429;

        proxy_pass         http://websearch_backend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # 抓取接口可能耗时较长
        proxy_connect_timeout  10s;
        proxy_send_timeout     300s;
        proxy_read_timeout     300s;
    }
}
