services:
  api:
    build:
      context: .
      dockerfile: src/WebSearch.Api/Dockerfile
    restart: unless-stopped
    # host 网络模式：容器直接使用宿主机网络栈
    # 效果：localhost:6379 / localhost:5432 直接访问宿主机或宿主机上的任意 Docker 容器端口
    # 彻底消除 host.docker.internal 在 Linux 上不等于 127.0.0.1 的问题
    network_mode: host
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:5080"
      Database__ApplyMigrationsOnStartup: "true"
      HealthChecks__IncludeDependencies: "true"
      Redis__Connection: "${REDIS_CONNECTION:-localhost:6379,abortConnect=false}"
      ConnectionStrings__Postgres: "${POSTGRES_CONNECTION:-Host=localhost;Port=5432;Database=websearch;Username=websearch;Password=websearch}"
      SearXng__BaseUrl: "http://localhost:18080"
      Crawl4Ai__BaseUrl: "http://localhost:18001"
      Firecrawl__ApiKey: "${FIRECRAWL_API_KEY:-}"
      Jina__ApiKey: "${JINA_API_KEY:-}"
      Cache__SearchTtlSeconds: "${CACHE_SEARCH_TTL:-7200}"
      Cache__ScrapeTtlSeconds: "${CACHE_SCRAPE_TTL:-86400}"
    depends_on:
      - searxng
      - crawl4ai

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:18080:8080"
    volumes:
      - ./deploy/searxng:/etc/searxng:rw
    environment:
      SEARXNG_BASE_URL: "http://localhost:18080/"
    networks:
      - websearch

  crawl4ai:
    build: ./services/crawl4ai
    restart: unless-stopped
    shm_size: "2gb"
    ports:
      - "127.0.0.1:18001:8001"
    networks:
      - websearch

  # builtin-redis：仅当 USE_BUILTIN_REDIS=true 时启用，暴露 localhost:6379
  redis:
    profiles: ["builtin-redis"]
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - websearch

  # builtin-postgres：仅当 USE_BUILTIN_POSTGRES=true 时启用，暴露 localhost:5432
  postgres:
    profiles: ["builtin-postgres"]
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: websearch
      POSTGRES_USER: websearch
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-websearch}"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - websearch

networks:
  websearch:
    driver: bridge

volumes:
  postgres_data:
