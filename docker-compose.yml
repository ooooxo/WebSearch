services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: websearch
      POSTGRES_USER: websearch
      POSTGRES_PASSWORD: websearch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U websearch -d websearch"]
      interval: 5s
      timeout: 3s
      retries: 5

  searxng:
    image: searxng/searxng:latest
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/searxng:/etc/searxng:rw
    environment:
      SEARXNG_BASE_URL: http://localhost:8080/

  crawl4ai:
    build: ./services/crawl4ai
    ports:
      - "8001:8001"
    shm_size: "2gb"

volumes:
  postgres_data:
