# WebSearch — production docker-compose
# app 使用 host 网络，crawl-svc / searxng 使用 bridge 网络并绑定到 127.0.0.1
# redis / postgres 通过 profile 控制：builtin-redis / builtin-postgres
# 用法: cp .env.example .env && bash install.sh

networks:
  app-net:
    driver: bridge

volumes:
  redis_data:
  postgres_data:

services:

  # ── 主服务：C# REST API ──────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: src/WebSearch.Api/Dockerfile
    restart: unless-stopped
    network_mode: host
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:${APP_PORT:-18900}"
      Database__ApplyMigrationsOnStartup: "true"
      HealthChecks__IncludeDependencies: "true"
      Redis__Connection: "${REDIS_CONNECTION:-localhost:6379,abortConnect=false}"
      ConnectionStrings__Postgres: "${POSTGRES_CONNECTION:-}"
      SearXng__BaseUrl: "http://localhost:8080"
      CrawlSvc__BaseUrl: "http://localhost:8001"
      Firecrawl__ApiKey: "${FIRECRAWL_API_KEY:-}"
      Firecrawl__BaseUrl: "https://api.firecrawl.dev"
      Tavily__ApiKey: "${TAVILY_API_KEY:-}"
      Cache__SearchTtlSeconds: "${CACHE_SEARCH_TTL:-7200}"
      Cache__ScrapeTtlSeconds: "${CACHE_SCRAPE_TTL:-86400}"
      SCRAPE_MAX_CHARS: "${SCRAPE_MAX_CHARS:-8000}"
    depends_on:
      searxng:
        condition: service_started
      crawl-svc:
        condition: service_healthy

  # ── 抓取服务：httpx + trafilatura ────────────────────────────────────────
  crawl-svc:
    build: ./services/crawl-svc
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - app-net

  # ── 搜索引擎：SearXNG ────────────────────────────────────────────────────
  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./deploy/searxng:/etc/searxng:rw
    environment:
      SEARXNG_BASE_URL: "http://localhost:${APP_PORT:-18900}/"
      SEARXNG_SECRET_KEY: "${SEARXNG_SECRET_KEY:-change-me}"
    networks:
      - app-net

  # ── 缓存：Redis（内置，按需启用）────────────────────────────────────────
  redis:
    profiles: [builtin-redis]
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── 日志库：PostgreSQL（内置，按需启用）──────────────────────────────────
  postgres:
    profiles: [builtin-postgres]
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: websearch
      POSTGRES_USER: websearch
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U websearch -d websearch"]
      interval: 5s
      timeout: 3s
      retries: 5
